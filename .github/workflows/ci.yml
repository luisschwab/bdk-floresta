on: [push, pull_request]
name: CI
env:
  CARGO_TERM_COLOR: always
permissions: {}

jobs:
  Test:
    name: Test - ${{ matrix.toolchain }} toolchain, ${{ matrix.dep }} deps
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, msrv]
        dep: [minimal, recent]
        exclude:
          # Exclude MSRV toolchain + `Cargo-recent.lock`
          - toolchain: msrv
            dep: recent
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: rust-bitcoin/rust-bitcoin-maintainer-tools/.github/actions/setup-rbmt@64715bab0d6fa1f3ebd6f9be336c4c5089bb5eb9
      - name: Run tests
        run: cargo rbmt test --toolchain ${{ matrix.toolchain }} --lock-file ${{ matrix.dep }}

  Check:
    name: Check - ${{ matrix.task }}
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    strategy:
      fail-fast: false
      matrix:
        task: [lint, docs]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: rust-bitcoin/rust-bitcoin-maintainer-tools/.github/actions/setup-rbmt@64715bab0d6fa1f3ebd6f9be336c4c5089bb5eb9
      - name: Run ${{ matrix.task }}
        run: cargo rbmt ${{ matrix.task }}
