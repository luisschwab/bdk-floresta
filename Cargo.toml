[package]
name = "bdk_floresta"
version = "0.1.0"
description = "A Floresta-powered chain-source crate for BDK"
authors = ["Luis Schwab <luisschwab@protonmail.com>"]
keywords = ["bitcoin", "bdk", "floresta", "utreexo"]
repository = "https://github.com/luisschwab/bdk-floresta"
readme = "README.md"
license = "MIT OR Apache-2.0"
edition = "2021"
rust-version = "1.85.0"

[features]
default = ["logger"]
logger = ["dep:tracing-appender", "dep:tracing-subscriber"]

[[example]]
name = "block_wallet_sync"
path = "examples/block_wallet_sync/src/main.rs"

[[example]]
name = "node"
path = "examples/node/src/main.rs"

[build-dependencies]
toml = { version = "1.0" }

[dependencies]
bitcoin = { version = "0.32.7" }
bdk_wallet = { version = "2.3" }
floresta-chain = { git = "https://github.com/getfloresta/Floresta.git", rev = "87e33b0381db516ee40bfc0ce0f838137eec5dfc", features = ["flat-chainstore"] }
floresta-compact-filters = { git = "https://github.com/getfloresta/Floresta.git", rev = "87e33b0381db516ee40bfc0ce0f838137eec5dfc" }
floresta-mempool = { git = "https://github.com/getfloresta/Floresta.git", rev = "87e33b0381db516ee40bfc0ce0f838137eec5dfc" }
floresta-wire = { git = "https://github.com/getfloresta/Floresta.git", rev = "87e33b0381db516ee40bfc0ce0f838137eec5dfc" }
thiserror = { version = "2.0" }
tokio = { version = "1.50", features = ["rt", "signal", "sync", "time"] }
tracing = { version = "0.1.41" }
tracing-appender = { version = "0.2", optional = true }
tracing-subscriber = { version = "0.3.19", features = ["ansi", "chrono", "env-filter"], optional = true }

# These pins are needed for `Cargo-minimal.lock`:
lazy_static = { version = "1.5.0" } # sharded-slab = "0.1.7"
dns-lookup = { version = "2.1.1" }
# These pins is needed for MSRV + `Cargo-recent.lock`:
time = { version = "0.3.45" } # time 0.3.47+ requires 1.88.0, but MSRV is 1.85.0

[dev-dependencies]
anyhow = { version = "1.0" }
tokio = { version = "1.50", features = ["macros", "rt-multi-thread"] }

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[package.metadata.rbmt.toolchains]
stable = "1.94.0"
nightly = "nightly-2026-03-18"

[package.metadata.rbmt.lint]
allowed_duplicates = [
    "base64",
    "bitcoin_hashes",
    "getrandom",
    "hex-conservative",
    "serde_core",
    "windows-sys",
]
